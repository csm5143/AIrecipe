version: "3.9"

services:
  # ==================== Nginx 反向代理 ====================
  nginx:
    image: nginx:alpine
    container_name: airecipe-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./deploy/certs:/etc/nginx/certs:ro
      - admin-web-dist:/usr/share/nginx/html:ro
      - uploads-data:/usr/share/nginx/html/uploads:ro
    depends_on:
      - admin-api
      - admin-web
    networks:
      - airecipe-network

  # ==================== 后台管理 API ====================
  admin-api:
    build:
      context: ./server/admin-api
      dockerfile: Dockerfile.prod
    container_name: airecipe-admin-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD}@${DB_HOST:-db}:${DB_PORT:-5432}/${DB_NAME:-airecipe}?schema=public
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-airecipe}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      OSS_ENDPOINT: ${OSS_ENDPOINT:-}
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID:-}
      OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET:-}
      OSS_BUCKET: ${OSS_BUCKET:-}
      TENCENT_COS_SECRET_ID: ${TENCENT_COS_SECRET_ID:-}
      TENCENT_COS_SECRET_KEY: ${TENCENT_COS_SECRET_KEY:-}
      TENCENT_COS_BUCKET: ${TENCENT_COS_BUCKET:-}
      TENCENT_COS_REGION: ${TENCENT_COS_REGION:-}
      TENCENT_COS_BASE_URL: ${TENCENT_COS_BASE_URL:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - airecipe-network
    volumes:
      - uploads-data:/app/uploads
      - admin-api-logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ==================== 后台管理 Web ====================
  admin-web:
    build:
      context: ./client/admin-web
      dockerfile: Dockerfile.prod
    container_name: airecipe-admin-web
    restart: unless-stopped
    networks:
      - airecipe-network
    volumes:
      - admin-web-dist:/app/dist

  # ==================== PostgreSQL 数据库 ====================
  db:
    image: postgres:16-alpine
    container_name: airecipe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-airecipe}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./server/admin-api/src/database/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - airecipe-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-airecipe}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    container_name: airecipe-redis
    restart: unless-stopped
    command: ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - airecipe-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  airecipe-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  admin-api-logs:
  admin-web-dist:
  uploads-data:
